name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  daemon-test:
    name: Daemon tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Run tests
        run: go test ./...
